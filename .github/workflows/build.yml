name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk \
        python3-pip autoconf libtool pkg-config \
        zlib1g-dev libncurses5-dev libncursesw5-dev \
        libtinfo5 cmake libffi-dev libssl-dev \
        android-sdk

    - name: Install Python tools
      run: |
        pip install --upgrade pip
        pip install cython==0.29.36 buildozer

    - name: Init buildozer
      run: buildozer init || true

    - name: Fix Android SDK (AIDL fix included)
      run: |
        export ANDROIDSDK=$HOME/.buildozer/android/platform/android-sdk
        export ANDROIDNDK=$HOME/.buildozer/android/platform/android-ndk
        export ANDROIDAPI=33
        export ANDROIDMINAPI=21

        yes | sdkmanager --licenses || true || true
        sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" || true

    - name: Build APK
      run: |
        export ANDROIDAPI=33
        export ANDROIDMINAPI=21

        buildozer android clean
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
